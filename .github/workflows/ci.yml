name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -U pip && python -m pip install -e '.[dev]'
      - name: Compile
        run: python -m compileall pinelib tests scripts
      - name: Test
        run: pytest -q
      - name: Typecheck
        run: mypy pinelib
      - name: Release script smoke
        run: python scripts/build_release.py
      - name: Release integrity
        run: python scripts/check_release_integrity.py RELEASE_MANIFEST_v1_0_1.json --require-head
